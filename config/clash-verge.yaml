# ===============================================
# 规则
# ===============================================
rules:
  # 广告拦截
  - RULE-SET,reject,🛑 广告拦截

  # ===== 自定义规则（优先级最高）=====
  - RULE-SET,ai-extra,🤖 OpenAI
  - RULE-SET,crypto,💰 Crypto
  - RULE-SET,proxy-extra,🚀 节点选择
  - RULE-SET,direct-extra,🎯 直连

  # ===== blackmatrix7 规则 =====
  # 流媒体
  - RULE-SET,bilibili,📺 哔哩哔哩
  - RULE-SET,disney,🎬 Disney+
  - RULE-SET,netflix,🎥 Netflix
  - RULE-SET,youtube,📹 YouTube
  - RULE-SET,tiktok,🎵 TikTok

  # 社交通讯
  - RULE-SET,telegram,📱 Telegram
  - RULE-SET,twitter,🐦 Twitter
  - RULE-SET,weibo,🧣 微博

  # 金融
  - RULE-SET,paypal,💳 PayPal

  # Apple
  - RULE-SET,apple,🍎 Apple

  # Google
  - RULE-SET,google,🚀 节点选择

  # 全球代理
  - RULE-SET,proxy,🚀 节点选择

  # 国内直连
  - RULE-SET,china,🎯 直连

  # 局域网
  - IP-CIDR,192.168.0.0/16,🎯 直连,no-resolve
  - IP-CIDR,10.0.0.0/8,🎯 直连,no-resolve
  - IP-CIDR,172.16.0.0/12,🎯 直连,no-resolve
  - IP-CIDR,127.0.0.0/8,🎯 直连,no-resolve
  - IP-CIDR,100.64.0.0/10,🎯 直连,no-resolve

  # GeoIP 中国
  - GEOIP,CN,🎯 直连

  # 兜底规则
  - MATCH,🚀 节点选择
