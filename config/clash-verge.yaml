# ===============================================
# Clash Verge Rev 配置文件
# 基于 Surge 配置迁移，方案 B+C
# ===============================================

# 端口配置
port: 7890
socks-port: 7891
mixed-port: 7892
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# DNS 配置
dns:
  enable: true
  ipv6: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - localhost.ptlogin2.qq.com
  nameserver:
    - 119.29.29.29
    - 223.5.5.5
  fallback:
    - https://dns.alidns.com/dns-query
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

# ===============================================
# 代理提供器（你的机场订阅）
# ===============================================
proxy-providers:
  # 机场1 - 替换为你的订阅链接
  airport1:
    type: http
    url: "YOUR_SUBSCRIPTION_URL_1"
    interval: 43200
    path: ./proxies/airport1.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204

  # 机场2 - 替换为你的订阅链接
  airport2:
    type: http
    url: "YOUR_SUBSCRIPTION_URL_2"
    interval: 43200
    path: ./proxies/airport2.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204

# ===============================================
# 策略组
# ===============================================
proxy-groups:
  # 主选择器（Final）
  - name: "🚀 节点选择"
    type: select
    proxies:
      - "♻️ 自动选择"
      - "🇭🇰 香港"
      - "🇨🇳 台湾"
      - "🇸🇬 新加坡"
      - "🇯🇵 日本"
      - "🇺🇸 美国"
      - "🇦🇺 澳大利亚"
      - "🎯 直连"

  # 自动选择
  - name: "♻️ 自动选择"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 50
    use:
      - airport1
      - airport2
    filter: "^((?!直接连接|全球直连|剩余流量|套餐到期|官网|重置|更新).)*$"

  # 香港
  - name: "🇭🇰 香港"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 50
    use:
      - airport1
      - airport2
    filter: "(?i)港|🇭🇰|香港|HK|Hong"

  # 台湾
  - name: "🇨🇳 台湾"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 50
    use:
      - airport1
      - airport2
    filter: "(?i)台|🇨🇳|台湾|TW|Tai"

  # 新加坡
  - name: "🇸🇬 新加坡"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 50
    use:
      - airport1
      - airport2
    filter: "(?i)坡|🇸🇬|新加坡|狮城|SG|Singapore"

  # 日本
  - name: "🇯🇵 日本"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 50
    use:
      - airport1
      - airport2
    filter: "(?i)🇯🇵|日本|JP|Japan"

  # 美国
  - name: "🇺🇸 美国"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 50
    use:
      - airport1
      - airport2
    filter: "(?i)美|🇺🇸|美国|US|States|American"

  # 澳大利亚
  - name: "🇦🇺 澳大利亚"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 50
    use:
      - airport1
      - airport2
    filter: "(?i)澳大利亚|🇦🇺|澳洲|AU|Australia|Aussie"

  # 直连
  - name: "🎯 直连"
    type: select
    proxies:
      - DIRECT

  # ============ 服务专用策略组 ============

  # Apple
  - name: "🍎 Apple"
    type: select
    proxies:
      - "🎯 直连"
      - "🚀 节点选择"
      - "🇭🇰 香港"
      - "🇺🇸 美国"

  # Bilibili
  - name: "📺 哔哩哔哩"
    type: select
    proxies:
      - "🎯 直连"
      - "🇭🇰 香港"
      - "🇨🇳 台湾"

  # Disney+
  - name: "🎬 Disney+"
    type: select
    proxies:
      - "🚀 节点选择"
      - "🇭🇰 香港"
      - "🇸🇬 新加坡"
      - "🇯🇵 日本"
      - "🇺🇸 美国"

  # Netflix
  - name: "🎥 Netflix"
    type: select
    proxies:
      - "🚀 节点选择"
      - "🇭🇰 香港"
      - "🇸🇬 新加坡"
      - "🇯🇵 日本"
      - "🇺🇸 美国"

  # PayPal
  - name: "💳 PayPal"
    type: select
    proxies:
      - "🇺🇸 美国"
      - "🇭🇰 香港"
      - "🎯 直连"

  # Telegram
  - name: "📱 Telegram"
    type: select
    proxies:
      - "🚀 节点选择"
      - "🇸🇬 新加坡"
      - "🇺🇸 美国"
      - "🇭🇰 香港"

  # TikTok
  - name: "🎵 TikTok"
    type: select
    proxies:
      - "🇯🇵 日本"
      - "🇨🇳 台湾"
      - "🇸🇬 新加坡"
      - "🇺🇸 美国"

  # OpenAI
  - name: "🤖 OpenAI"
    type: select
    proxies:
      - "🇺🇸 美国"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"
      - "🇨🇳 台湾"

  # Twitter
  - name: "🐦 Twitter"
    type: select
    proxies:
      - "🚀 节点选择"
      - "🇭🇰 香港"
      - "🇺🇸 美国"
      - "🇯🇵 日本"

  # YouTube
  - name: "📹 YouTube"
    type: select
    proxies:
      - "🚀 节点选择"
      - "🇭🇰 香港"
      - "🇺🇸 美国"
      - "🇯🇵 日本"
      - "🇸🇬 新加坡"

  # Weibo
  - name: "🧣 微博"
    type: select
    proxies:
      - "🎯 直连"
      - "🇭🇰 香港"
      - "🇨🇳 台湾"

  # Crypto
  - name: "💰 Crypto"
    type: select
    proxies:
      - "🇸🇬 新加坡"
      - "🇭🇰 香港"
      - "🇯🇵 日本"
      - "🇺🇸 美国"

  # 广告拦截
  - name: "🛑 广告拦截"
    type: select
    proxies:
      - REJECT
      - DIRECT

# ===============================================
