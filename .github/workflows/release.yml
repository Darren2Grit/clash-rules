name: Release Rules

on:
  push:
    branches: [main]
    paths:
      - 'rules/**'
      - 'config/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release branch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git checkout -B release
          git add -f rules/ config/
          git commit -m "Release rules $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push -f origin release
